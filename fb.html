<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>د. محمود سامي · Facebook</title>
  <meta name="robots" content="noindex" />
  <meta name="facebook-qr-scan-post" content="" />
  <meta http-equiv="refresh" content="2; url=https://www.facebook.com/DrMahmoudSamiEyeClinic" />
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    main {
      width: min(100%, 420px);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
      color: #0f766e;
    }

    p {
      margin: 0.35rem 0;
      color: #475569;
      line-height: 1.6;
    }

    a {
      color: #1877f2;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>عيادة د. محمود سامي لطب العيون</h1>
    <p>يتم فتح صفحة Facebook الخاصة بالعيادة الآن.</p>
    <p><a id="fallback-link" href="https://www.facebook.com/DrMahmoudSamiEyeClinic">اضغط هنا إذا لم يتم التحويل تلقائيا</a></p>
  </main>

  <script>
    (function () {
      var target = 'https://www.facebook.com/DrMahmoudSamiEyeClinic';
      var endpoint = (document.querySelector('meta[name="facebook-qr-scan-post"]')?.content || '').trim();
      var event = {
        id: 'fbqr-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9),
        scannedAt: new Date().toISOString(),
        source: 'facebook-clinic-qr',
        target: target,
        pageUrl: location.href,
        referrer: document.referrer || ''
      };
      var payload = JSON.stringify({ event: event });
      try {
        if (endpoint) {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(endpoint, new Blob([payload], { type: 'text/plain' }));
          } else {
            fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain' },
              body: payload,
              keepalive: true,
              mode: 'no-cors'
            }).catch(function () {});
          }
        }
      } catch (e) {
        /* Redirect even if scan logging is unavailable. */
      }
      setTimeout(function () {
        location.replace(target);
      }, 650);
    })();
  </script>
</body>
</html>
